<!-- @dsCard group="Spacing" viewport="700x230" name="Liquid Glass" subtitle="Thin · Regular · Thick — specular + aurora" -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 0; }
  .stage {
    padding: 26px 22px; min-height: 230px; box-sizing: border-box; position: relative; overflow: hidden;
    background:
      radial-gradient(420px 320px at 10% 10%, color-mix(in oklab, var(--brand-red) 26%, transparent), transparent 60%),
      radial-gradient(480px 360px at 92% 92%, color-mix(in oklab, var(--brand-navy) 30%, transparent), transparent 60%),
      radial-gradient(420px 340px at 65% 18%, color-mix(in oklab, var(--sys-indigo) 18%, transparent), transparent 65%),
      var(--surface-secondary);
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; align-items: stretch;
  }
  .panel {
    position: relative; padding: 18px 20px; border-radius: var(--radius-lg);
    border: 1px solid var(--glass-border);
    box-shadow: var(--glass-shadow), inset 0 1px 0 var(--glass-edge);
    font-family: var(--font-cmd); font-weight: 600; color: var(--text-primary);
    overflow: hidden;
  }
  .panel::before { content: ""; position: absolute; inset: 0; background: var(--glass-specular); pointer-events: none; }
  .panel > * { position: relative; }
  .panel small { display: block; font-family: var(--font-mono); font-size: 10.5px; color: var(--text-secondary); margin-top: 6px; direction: ltr; text-transform: uppercase; letter-spacing: var(--tracking-wide); }
  .panel--thin    { background: var(--glass-thin);    -webkit-backdrop-filter: var(--glass-blur-thin);    backdrop-filter: var(--glass-blur-thin); }
  .panel--regular { background: var(--glass-regular); -webkit-backdrop-filter: var(--glass-blur-regular); backdrop-filter: var(--glass-blur-regular); }
  .panel--thick   { background: var(--glass-thick);   -webkit-backdrop-filter: var(--glass-blur-thick);   backdrop-filter: var(--glass-blur-thick); }
</style>
</head>
<body>
  <div class="stage">
    <div class="panel panel--thin">رفيع<small>thin · blur 20</small></div>
    <div class="panel panel--regular">اعتيادي<small>regular · blur 28</small></div>
    <div class="panel panel--thick">سميك<small>thick · blur 40</small></div>
  </div>
</body>
</html>
