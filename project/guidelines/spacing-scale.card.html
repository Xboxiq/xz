<!-- @dsCard group="Spacing" viewport="700x150" name="Spacing scale" subtitle="4px base step — s1 → s16" -->
<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--surface); display: flex; align-items: flex-end; gap: 14px; }
  .b { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .b__box { background: var(--brand-navy); border-radius: 4px; }
  .b__lbl { font-family: var(--font-mono); font-size: 10px; color: var(--text-soft); }
</style>
</head>
<body>
  <div class="b"><div class="b__box" style="width:var(--s1);height:var(--s1)"></div><span class="b__lbl">s1·4</span></div>
  <div class="b"><div class="b__box" style="width:var(--s2);height:var(--s2)"></div><span class="b__lbl">s2·8</span></div>
  <div class="b"><div class="b__box" style="width:var(--s3);height:var(--s3)"></div><span class="b__lbl">s3·12</span></div>
  <div class="b"><div class="b__box" style="width:var(--s4);height:var(--s4)"></div><span class="b__lbl">s4·16</span></div>
  <div class="b"><div class="b__box" style="width:var(--s6);height:var(--s6)"></div><span class="b__lbl">s6·24</span></div>
  <div class="b"><div class="b__box" style="width:var(--s8);height:var(--s8)"></div><span class="b__lbl">s8·32</span></div>
  <div class="b"><div class="b__box" style="width:var(--s12);height:var(--s12)"></div><span class="b__lbl">s12·48</span></div>
  <div class="b"><div class="b__box" style="width:var(--s16);height:var(--s16)"></div><span class="b__lbl">s16·64</span></div>
</body>
</html>
