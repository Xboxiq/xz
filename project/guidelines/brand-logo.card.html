<!-- @dsCard group="Brand" viewport="700x240" name="Logo — TEC mark" subtitle="Navy ring, crimson wordmark on white" -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 0; }
  .stage { min-height: 240px; box-sizing: border-box; display: flex; gap: 24px; padding: 24px; }
  .tile { flex: 1; border-radius: var(--radius-lg); display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 12px; box-shadow: var(--shadow-sm); }
  .tile--light { background: #fff; border: 1px solid var(--border); }
  .tile--navy { background: var(--brand-navy); }
  .mark { width: 96px; height: 96px; background: #fff; border-radius: 20px; display: grid; place-items: center; box-shadow: 0 2px 12px rgba(0,0,0,.18), inset 0 0 0 2px color-mix(in srgb, var(--brand-gold) 55%, transparent); }
  .mark img { width: 78%; height: 78%; object-fit: contain; }
  .wm { display: flex; flex-direction: column; align-items: center; line-height: 1.2; }
  .wm strong { font-family: var(--font-display); font-weight: 800; font-size: 20px; }
  .wm small { font-family: var(--font-mono); font-size: 11px; letter-spacing: .12em; opacity: .7; }
  .tile--light .wm strong { color: var(--text); }
  .tile--light .wm small { color: var(--text-soft); }
  .tile--navy .wm strong, .tile--navy .wm small { color: #fff; }
</style>
</head>
<body>
  <div class="stage">
    <div class="tile tile--light">
      <span class="mark"><img src="../assets/logo.png" alt="Tadfuq Al-Khayr logo" /></span>
      <span class="wm"><strong>تدفّق الخير</strong><small>RASAFA · CS HUB</small></span>
    </div>
    <div class="tile tile--navy">
      <span class="mark"><img src="../assets/logo.png" alt="Tadfuq Al-Khayr logo" /></span>
      <span class="wm"><strong>تدفّق الخير</strong><small>RASAFA · CS HUB</small></span>
    </div>
  </div>
</body>
</html>
