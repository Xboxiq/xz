<!-- @dsCard group="Colors" viewport="700x200" name="Brand primitives" subtitle="Navy ring, crimson wordmark, ceremonial gold" -->
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 22px; background: var(--surface); }
  .swatches { display: grid; grid-template-columns: repeat(6, 1fr); gap: 12px; }
  .sw { border-radius: var(--radius); overflow: hidden; border: 1px solid var(--border); box-shadow: var(--shadow-xs); }
  .sw__chip { height: 72px; }
  .sw__meta { padding: 8px 10px; font-family: var(--font-mono); font-size: 11px; line-height: 1.5; }
  .sw__name { font-family: var(--font-cmd); font-weight: 700; font-size: 12px; color: var(--text); }
  .sw__hex { color: var(--text-soft); text-transform: uppercase; }
</style>
</head>
<body>
<div class="swatches">
  <div class="sw"><div class="sw__chip" style="background:var(--brand-navy)"></div><div class="sw__meta"><div class="sw__name">navy</div><div class="sw__hex">#232350</div></div></div>
  <div class="sw"><div class="sw__chip" style="background:var(--brand-navy-2)"></div><div class="sw__meta"><div class="sw__name">navy-2</div><div class="sw__hex">#2e2e6b</div></div></div>
  <div class="sw"><div class="sw__chip" style="background:var(--brand-navy-3)"></div><div class="sw__meta"><div class="sw__name">navy-3</div><div class="sw__hex">#15153a</div></div></div>
  <div class="sw"><div class="sw__chip" style="background:var(--brand-red)"></div><div class="sw__meta"><div class="sw__name">red</div><div class="sw__hex">#c1121f</div></div></div>
  <div class="sw"><div class="sw__chip" style="background:var(--brand-red-2)"></div><div class="sw__meta"><div class="sw__name">red-2</div><div class="sw__hex">#e0313c</div></div></div>
  <div class="sw"><div class="sw__chip" style="background:var(--brand-gold)"></div><div class="sw__meta"><div class="sw__name">gold</div><div class="sw__hex">#f4c430</div></div></div>
</div>
</body>
</html>
