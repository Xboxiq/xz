<!-- @dsCard group="Type" viewport="700x190" name="Display — IBM Plex Sans" subtitle="Latin display, numerals & status type" -->
<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="utf-8" />
<link rel="stylesheet" href="../styles.css" />
<style>
  body { margin: 0; padding: 24px; background: var(--surface-primary); font-family: var(--font-display); color: var(--text-primary); }
  .xl { font-size: 42px; font-weight: 600; letter-spacing: var(--tracking-display); line-height: 1.05; }
  .meta { font-family: var(--font-mono); font-size: 11px; color: var(--text-secondary); margin-top: 14px; text-transform: uppercase; letter-spacing: var(--tracking-caps); }
  .nums { font-size: 26px; font-weight: 500; margin-top: 10px; font-variant-numeric: tabular-nums; letter-spacing: var(--tracking-tight); }
</style>
</head>
<body>
  <div class="xl">Rasafa Service Hub</div>
  <div class="nums">84 · 213 · 4,810,000 · 94%</div>
  <div class="meta">IBM Plex Sans — 400 / 500 / 600 / 700</div>
</body>
</html>
